# Phase 10 — single entrypoint: UI + API + WebSocket on port 8080 (see docker-compose gateway).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream quantedge_api {
    server backend:8000;
}

upstream quantedge_ui {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain;

    location /v1/ws {
        proxy_pass http://quantedge_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location /v1/ {
        proxy_pass http://quantedge_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        proxy_pass http://quantedge_api;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://quantedge_api;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://quantedge_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
