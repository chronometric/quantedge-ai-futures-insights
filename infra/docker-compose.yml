services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantedge
      POSTGRES_PASSWORD: quantedge
      POSTGRES_DB: quantedge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantedge -d quantedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://quantedge:quantedge@postgres:5432/quantedge
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MARKET_SYMBOLS: ES,NQ
      MOCK_MARKET_DATA: "true"
      MOCK_TICK_SECONDS: "0.25"
      RETENTION_MONTHS: "6"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
