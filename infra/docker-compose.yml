services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantedge
      POSTGRES_PASSWORD: quantedge
      POSTGRES_DB: quantedge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantedge -d quantedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://quantedge:quantedge@postgres:5432/quantedge
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      MARKET_SYMBOLS: ES,NQ
      MOCK_MARKET_DATA: "true"
      MOCK_TICK_SECONDS: "0.25"
      RETENTION_MONTHS: "6"
      KB_DIR: /app/kb
      CHROMA_PERSIST_DIR: /app/.chroma
    volumes:
      - ../kb:/app/kb:ro
      - chroma_data:/app/.chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Empty = same-origin via gateway (Phase 10); direct UI on 5173 still works with dev proxy.
      VITE_API_BASE_URL: ""
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  chroma_data:
